<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe — Defence Trading</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #000000; --red: #E31837; --white: #ffffff; --gray: #e0e0e0; --text: #1a1a1a; --text-light: #666; }
  body { font-family: Arial, Helvetica, sans-serif; background: #f4f4f4; color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
  .main-nav { background: var(--white); border-bottom: 1px solid var(--gray); padding: 0 32px; display: flex; align-items: center; height: 56px; }
  .brand { font-size: 22px; font-weight: 900; color: var(--black); text-decoration: none; letter-spacing: -1px; }
  .brand span { color: var(--red); font-size: 8px; vertical-align: super; }
  .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
  .card { background: #fff; max-width: 520px; width: 100%; padding: 56px 48px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .icon { width: 64px; height: 64px; margin: 0 auto 28px; display: flex; align-items: center; justify-content: center; }
  .icon-success { background: #e8f5e9; }
  .icon-error { background: #fdecea; }
  h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 14px; color: var(--black); }
  p { font-size: 15px; color: var(--text-light); line-height: 1.7; margin-bottom: 10px; }
  .email-badge { display: inline-block; background: #f4f4f4; border: 1px solid var(--gray); padding: 6px 16px; font-size: 14px; font-weight: 700; color: var(--text); margin: 12px 0 24px; }
  .btn { display: inline-block; background: var(--black); color: #fff; padding: 13px 28px; font-size: 13px; font-weight: 700; text-decoration: none; letter-spacing: 0.3px; transition: background 0.15s; margin-top: 24px; }
  .btn:hover { background: #333; }
  footer { background: #000; padding: 24px 32px; text-align: center; }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.4); }
</style>
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

<nav class="main-nav">
  <a href="index.html" class="brand">DefenceTrading<span>®</span></a>
</nav>

<div class="wrap">
  <div class="card" id="card">
    <!-- Content injected by JS -->
  </div>
</div>

<footer>
  <div class="footer-copy">&copy; 2026 Defence Trading. All rights reserved.</div>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const status = params.get('status');
  const email  = params.get('email') || '';
  const card   = document.getElementById('card');

  if (status === 'success') {
    card.innerHTML = `
      <div class="icon icon-success">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>You've been unsubscribed</h1>
      ${email ? `<div class="email-badge">${decodeURIComponent(email)}</div>` : ''}
      <p>You will no longer receive marketing emails from Defence Trading.</p>
      <p>If this was a mistake, you can always contact us at <a href="mailto:sales@defencetrading.com" style="color:#000;font-weight:700;">sales@defencetrading.com</a>.</p>
      <a href="index.html" class="btn">Return to Homepage</a>
    `;
  } else {
    card.innerHTML = `
      <div class="icon icon-error">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c62828" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h1>Something went wrong</h1>
      <p>We were unable to process your unsubscribe request. Please contact us directly at <a href="mailto:sales@defencetrading.com" style="color:#000;font-weight:700;">sales@defencetrading.com</a> and we'll remove you manually.</p>
      <a href="index.html" class="btn">Return to Homepage</a>
    `;
  }
</script>

</body>
</html>
